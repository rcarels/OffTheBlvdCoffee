backend:
  name: git-gateway
  repo: rcarels/OffTheBlvdCoffee
  branch: main

media_folder: assets
public_folder: /assets

collections:
  - name: events
    label: Events
    files:
      - name: events
        label: Events content
        file: content/events.json
        fields:
          - name: events
            label: Events list
            widget: list
            fields:
              - name: title
                label: Title
                widget: string
              - name: date
                label: Date
                widget: datetime
                format: YYYY-MM-DD
              - name: time
                label: Time
                widget: string
              - name: area
                label: Area / Location
                widget: string
              - name: type
                label: Event Type
                widget: select
                options:
                  - Public Event
                  - Private Booking
              - name: details
                label: Details
                widget: text

  - name: about
    label: About
    files:
      - name: about
        label: About content
        file: content/about.json
        fields:
          - name: heading
            label: Heading
            widget: string
          - name: mainParagraph
            label: Main paragraph
            widget: text
          - name: storyParagraph
            label: Story paragraph
            widget: text
          - name: serviceAreaText
            label: Service area text
            widget: string

  - name: menu
    label: Menu
    files:
      - name: menu
        label: Menu content
        file: content/menu.json
        fields:
          - name: categories
            label: Menu categories
            widget: list
            fields:
              - name: category
                label: Category name
                widget: string
              - name: items
                label: Items
                widget: list
                fields:
                  - name: name
                    label: Item name
                    widget: string
                  - name: description
                    label: Description
                    widget: text
                  - name: price
                    label: Price
                    widget: string

  - name: gallery
    label: Gallery
    files:
      - name: gallery
        label: Gallery content
        file: content/gallery.json
        fields:
          - name: images
            label: Gallery items
            widget: list
            fields:
              - name: src
                label: Image path (in assets/)
                widget: string
              - name: alt
                label: Alt text
                widget: string
              - name: caption
                label: Caption
                widget: string
