<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Off The Blvd Coffee Admin</title>
</head>
<body>
  <h1>Off The Blvd Coffee Admin</h1>

  <section id="login">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="password" name="password" placeholder="Admin password" required>
      <button type="submit">Login</button>
    </form>
    <p id="loginMessage"></p>
  </section>

  <section id="dashboard" hidden>
    <h2>Dashboard</h2>
    <p>Login successful.</p>
    <h3>Next: Quote Requests</h3>
    <button id="loadQuotes">Load Quote Requests</button>
<div id="quotes"></div>
  </section>

  <script>
    const loginForm = document.getElementById("loginForm");
    const loginMessage = document.getElementById("loginMessage");
    const login = document.getElementById("login");
    const dashboard = document.getElementById("dashboard");

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const formData = new FormData(loginForm);

      const response = await fetch("/api/admin-login", {
        method: "POST",
        body: formData,
      });

      const result = await response.json();

      if (!result.ok) {
        loginMessage.textContent = result.error || "Login failed.";
        return;
      }

      login.hidden = true;
      dashboard.hidden = false;
    });
    document.getElementById("loadQuotes").addEventListener("click", async () => {
  const quotesDiv = document.getElementById("quotes");
  quotesDiv.textContent = "Loading...";

  const response = await fetch("/api/admin-quotes");
  const result = await response.json();

  if (!result.ok) {
    quotesDiv.textContent = result.error || "Could not load quotes.";
    return;
  }

  quotesDiv.innerHTML = result.quotes.map(q => `
    <div style="border:1px solid #ccc;padding:12px;margin:12px 0;">
      <strong>${q.name}</strong><br>
      Email: ${q.email}<br>
      Phone: ${q.phone || ""}<br>
      Event Date: ${q.event_date || ""}<br>
      Type: ${q.event_type || ""}<br>
      Guests: ${q.guests || ""}<br>
      Location: ${q.location || ""}<br>
      Details: ${q.details || ""}<br>
      Status: ${q.status || "New"}<br>
      Created: ${q.created_at || ""}
    </div>
  `).join("");
});
  </script>
</body>
</html>
