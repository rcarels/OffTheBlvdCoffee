<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Off The Blvd Coffee Admin</title>

    <!-- Decap CMS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/decap-cms@3.13.0/dist/cms.css" />
  </head>
  <body>
    <!-- Netlify Identity widget (required for recovery/invite/password reset flows) -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <script>
      // Decap CMS bootstraps itself from /admin/config.yml
      window.decapCMS = window.decapCMS || {};

      // Ensure recovery_token / invite_token URLs work when landing on /admin
      // Netlify Identity uses location.hash (e.g. /#recovery_token=...).
      (function () {
        var hash = window.location.hash || '';
        var hasRecoveryToken = hash.indexOf('recovery_token=') !== -1;
        var hasInviteToken = hash.indexOf('invite_token=') !== -1;

        window.netlifyIdentity = window.netlifyIdentity || null;

        // Wait for the identity widget to initialize, then open the appropriate flow.
        window.netlifyIdentity.on('init', function (user) {
          if ((hasRecoveryToken || hasInviteToken) && !user) {
            window.netlifyIdentity.open();
          }
        });

        // If identity already initialized, handle immediately.
        if (hasRecoveryToken || hasInviteToken) {
          try {
            if (window.netlifyIdentity.currentUser && !window.netlifyIdentity.currentUser()) {
              window.netlifyIdentity.open();
            }
          } catch (e) {}
        }
      })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/decap-cms@3.13.0/dist/decap-cms.js"></script>
  </body>
</html>
